<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mother's Day Surprise</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      overflow: hidden;
    }

    .page {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    .home {
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      flex-direction: column;
    }

    .home h1 {
      font-size: 3rem;
      margin-bottom: 15px;
      text-shadow: 0 6px 18px rgba(0,0,0,0.18);
    }

    .home p {
      margin-bottom: 30px;
      font-size: 1.2rem;
    }

    .btn {
      padding: 14px 32px;
      background: white;
      color: #d6336c;
      border-radius: 40px;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      border: none;
      font-size: 1rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.18);
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .hearts span {
      position: absolute;
      bottom: -50px;
      font-size: 24px;
      animation: floatHeart linear infinite;
      opacity: 0.7;
    }

    @keyframes floatHeart {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(-120vh);
      }
    }

    .surprise {
      display: none;
      background: radial-gradient(circle at top, #fff8fb, #ffe4ef 45%, #f8cdda);
      overflow: hidden;
    }

    .message-card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 85%;
      max-width: 430px;
      background: rgba(255,255,255,0.96);
      padding: 28px;
      border-radius: 28px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(184, 62, 114, 0.25);
      z-index: 5;
      border: 2px solid rgba(255,255,255,0.9);
    }

    .message-card h2 {
      color: #d6336c;
      margin-bottom: 15px;
      font-size: 1.8rem;
    }

    .message-card p {
      color: #555;
      line-height: 1.6;
      font-size: 1rem;
    }

    .balloon {
      position: absolute;
      width: 58px;
      height: 72px;
      border-radius: 50% 50% 45% 45%;
      cursor: pointer;
      z-index: 3;
      animation: gentleWiggle 2.8s infinite ease-in-out;
      box-shadow: inset -8px -12px 18px rgba(0,0,0,0.12), 0 8px 20px rgba(0,0,0,0.12);
    }

    .balloon::before {
      content: "";
      position: absolute;
      top: 12px;
      left: 14px;
      width: 14px;
      height: 22px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      transform: rotate(20deg);
    }

    .balloon::after {
      content: "";
      position: absolute;
      bottom: -9px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 12px solid currentColor;
    }

    .string {
      position: absolute;
      left: 50%;
      top: 74px;
      width: 1px;
      height: 34px;
      background: rgba(100,100,100,0.35);
      transform: translateX(-50%);
    }

    @keyframes gentleWiggle {
      0%, 100% {
        transform: translate(0, 0) rotate(-2deg) scale(1);
        filter: brightness(1);
      }
      50% {
        transform: translate(4px, -6px) rotate(3deg) scale(1.03);
        filter: brightness(1.08);
      }
    }

    .b1 { background: #ff4d6d; color: #ff4d6d; left: 8%; top: 12%; animation-delay: 0s; }
    .b2 { background: #ffb703; color: #ffb703; left: 24%; top: 8%; animation-delay: .4s; }
    .b3 { background: #8ecae6; color: #8ecae6; left: 46%; top: 7%; animation-delay: .8s; }
    .b4 { background: #b5179e; color: #b5179e; left: 70%; top: 10%; animation-delay: 1.2s; }
    .b5 { background: #06d6a0; color: #06d6a0; left: 86%; top: 18%; animation-delay: .2s; }

    .b6 { background: #f72585; color: #f72585; left: 5%; top: 40%; animation-delay: .7s; }
    .b7 { background: #7209b7; color: #7209b7; left: 17%; top: 62%; animation-delay: 1.1s; }
    .b8 { background: #fb8500; color: #fb8500; left: 78%; top: 55%; animation-delay: .5s; }
    .b9 { background: #4361ee; color: #4361ee; left: 90%; top: 42%; animation-delay: 1.4s; }

    .b10 { background: #ef476f; color: #ef476f; left: 10%; top: 78%; animation-delay: .3s; }
    .b11 { background: #ffd166; color: #ffd166; left: 31%; top: 82%; animation-delay: .9s; }
    .b12 { background: #118ab2; color: #118ab2; left: 54%; top: 82%; animation-delay: 1.5s; }
    .b13 { background: #9b5de5; color: #9b5de5; left: 73%; top: 78%; animation-delay: .6s; }
    .b14 { background: #00bbf9; color: #00bbf9; left: 62%; top: 28%; animation-delay: 1s; }
    .b15 { background: #f15bb5; color: #f15bb5; left: 28%; top: 30%; animation-delay: 1.8s; }

    .photo-popup {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10;
      padding: 20px;
    }

    .photo-popup img {
      max-width: 90%;
      max-height: 80vh;
      border-radius: 22px;
      border: 5px solid white;
      box-shadow: 0 15px 40px rgba(255,255,255,0.25);
    }

    .close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 40px;
      color: white;
      cursor: pointer;
    }

    @media(max-width: 600px) {
      .home h1 {
        font-size: 2.2rem;
      }

      .home p {
        font-size: 1rem;
        padding: 0 22px;
      }

      .message-card {
        width: 86%;
        padding: 22px;
      }

      .message-card h2 {
        font-size: 1.45rem;
      }

      .message-card p {
        font-size: 0.92rem;
      }

      .balloon {
        width: 42px;
        height: 54px;
      }

      .string {
        top: 56px;
        height: 24px;
      }

      .balloon::after {
        bottom: -7px;
        border-left-width: 6px;
        border-right-width: 6px;
        border-top-width: 9px;
      }

      .b1 { left: 5%; top: 9%; }
      .b2 { left: 24%; top: 5%; }
      .b3 { left: 47%; top: 4%; }
      .b4 { left: 70%; top: 6%; }
      .b5 { left: 86%; top: 13%; }

      .b6 { left: 3%; top: 33%; }
      .b7 { left: 9%; top: 60%; }
      .b8 { left: 82%; top: 58%; }
      .b9 { left: 88%; top: 35%; }

      .b10 { left: 6%; top: 82%; }
      .b11 { left: 27%; top: 86%; }
      .b12 { left: 50%; top: 87%; }
      .b13 { left: 76%; top: 83%; }
      .b14 { left: 73%; top: 25%; }
      .b15 { left: 20%; top: 25%; }
    }
    .tap-text{
  margin-top: 18px;
  color: #d6336c;
  font-weight: bold;
  font-size: 1rem;
  animation: blink 1.5s infinite;
}

@keyframes blink{
  0%{
    opacity: 1;
  }
  50%{
    opacity: 0.4;
  }
  100%{
    opacity: 1;
  }
}
  </style>
</head>
<body>

  <div class="page home" id="homePage">
    <div class="hearts">
      <span style="left:10%; animation-duration:7s;">❤️</span>
      <span style="left:30%; animation-duration:9s;">💕</span>
      <span style="left:50%; animation-duration:8s;">💖</span>
      <span style="left:70%; animation-duration:10s;">💗</span>
      <span style="left:90%; animation-duration:6s;">❤️</span>
    </div>

    <h1>Happy Mother's Day</h1>
    <p>To the strongest and sweetest women in our lives ❤️</p>
    <button class="btn" onclick="showSurprise()">Click Me ❤️</button>
  </div>

  <div class="page surprise" id="surprisePage">

    <div class="message-card">
      <h2>Happy Mother's Day ❤️</h2>
      <p>
        Thank you for every hug, every sacrifice, every smile, and every moment of love.
        You make our world brighter every single day.
        We love you endlessly.
      </p>
      <p class="tap-text">🎈 Tap the balloons for memories 🎈</p>
    </div>

    <div class="balloon b1" onclick="openPopup(0)"><span class="string"></span></div>
    <div class="balloon b2" onclick="openPopup(1)"><span class="string"></span></div>
    <div class="balloon b3" onclick="openPopup(2)"><span class="string"></span></div>
    <div class="balloon b4" onclick="openPopup(3)"><span class="string"></span></div>
    <div class="balloon b5" onclick="openPopup(4)"><span class="string"></span></div>
    <div class="balloon b6" onclick="openPopup(5)"><span class="string"></span></div>
    <div class="balloon b7" onclick="openPopup(6)"><span class="string"></span></div>
    <div class="balloon b8" onclick="openPopup(7)"><span class="string"></span></div>
    <div class="balloon b9" onclick="openPopup(8)"><span class="string"></span></div>
    <div class="balloon b10" onclick="openPopup(9)"><span class="string"></span></div>
    <div class="balloon b11" onclick="openPopup(10)"><span class="string"></span></div>
    <div class="balloon b12" onclick="openPopup(11)"><span class="string"></span></div>
    <div class="balloon b13" onclick="openPopup(12)"><span class="string"></span></div>
    <div class="balloon b14" onclick="openPopup(13)"><span class="string"></span></div>
    <div class="balloon b15" onclick="openPopup(14)"><span class="string"></span></div>

  </div>

  <div class="photo-popup" id="popup">
    <span class="close" onclick="closePopup()">&times;</span>
    <img id="popupImage" src="" alt="Mother's Day photo">
  </div>

  <script>
    const photos = [
      'pictures/pic1.jpeg',
      'pictures/pic2.jpeg',
      'pictures/pic3.jpeg',
      'pictures/pic4.jpeg',
      'pictures/pic5.jpeg',
      'pictures/pic6.jpeg',
      'pictures/pic7.jpeg',
      'pictures/pic8.png',
      'pictures/pic9.jpeg',
      'pictures/pic10.jpeg',
      'pictures/pic11.jpeg',
      'pictures/pic12.jpeg',
      'pictures/pic13.jpeg',
      'pictures/pic14.png',
      'pictures/pic15.jpeg'
    ];

    function showSurprise() {
      document.getElementById('homePage').style.display = 'none';
      document.getElementById('surprisePage').style.display = 'block';
    }

    function openPopup(index) {
      document.getElementById('popup').style.display = 'flex';
      document.getElementById('popupImage').src = photos[index];
    }

    function closePopup() {
      document.getElementById('popup').style.display = 'none';
    }
  </script>

</body>
</html>
